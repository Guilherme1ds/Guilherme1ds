name: Generate Snake Animation

on:
  # Executa a cada 24 horas
  schedule:
    - cron: "0 0 * * *" 
  # Permite rodar manualmente a qualquer momento
  workflow_dispatch:
  # Atualiza sempre que você mudar o README principal
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: Platane/snk@v3
        with:
          # Usa o seu nome de usuário
          github_user_name: ${{ github.repository_owner }}
          
          # Gera a animação com as cores do Painel Cyberpunk (Fundo escuro, quadrados azuis, cobra Ciano)
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00FFFF&color_dots=#091324,#003366,#1E90FF,#00BFFF,#00FFFF
            
      - name: Push para a branch output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
